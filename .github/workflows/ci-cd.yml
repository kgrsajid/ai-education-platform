name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build --no-cache -t my-frontend:latest .

      - name: Deploy
        run: |
          docker stop frontend || true
          docker rm frontend || true
          docker stop frontend-dev || true
          docker rm frontend-dev || true
          docker run -d --name frontend -p 80:80 my-frontend:latest
