<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <!-- Body -->
  <rect x="22" y="65" width="76" height="55" rx="10" fill="FILL_COLOR" opacity="0.9"/>
  <!-- Gear on chest -->
  <circle cx="60" cy="90" r="15" fill="white" opacity="0.12" stroke="white" stroke-width="1" opacity="0.2"/>
  <circle cx="60" cy="90" r="8" fill="white" opacity="0.15"/>
  <!-- Head -->
  <rect x="18" y="10" width="84" height="58" rx="14" fill="FILL_COLOR"/>
  <!-- Hat/book -->
  <rect x="30" y="2" width="60" height="12" rx="4" fill="FILL_COLOR" opacity="0.7"/>
  <rect x="35" y="-2" width="50" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <!-- Eyes -->
  <rect x="32" y="28" width="18" height="12" rx="4" fill="white"/>
  <rect x="70" y="28" width="18" height="12" rx="4" fill="white"/>
  <circle cx="41" cy="34" r="4" fill="#1e293b"/>
  <circle cx="79" cy="34" r="4" fill="#1e293b"/>
  <!-- Focused mouth -->
  <rect x="48" y="50" width="24" height="4" rx="2" fill="white" opacity="0.4"/>
  <!-- Cape -->
  <path d="M22 70 Q10 100 15 130 L30 130 Q28 100 35 70" fill="FILL_COLOR" opacity="0.4"/>
  <path d="M98 70 Q110 100 105 130 L90 130 Q92 100 85 70" fill="FILL_COLOR" opacity="0.4"/>
  <!-- Arms -->
  <rect x="2" y="72" width="22" height="12" rx="6" fill="FILL_COLOR" opacity="0.8"/>
  <rect x="96" y="72" width="22" height="12" rx="6" fill="FILL_COLOR" opacity="0.8"/>
  <!-- Legs -->
  <rect x="32" y="120" width="20" height="30" rx="8" fill="FILL_COLOR" opacity="0.7"/>
  <rect x="68" y="120" width="20" height="30" rx="8" fill="FILL_COLOR" opacity="0.7"/>
  <!-- Energy glow -->
  <circle cx="60" cy="90" r="4" fill="#fbbf24" opacity="0.6"/>
</svg>
