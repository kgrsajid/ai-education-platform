<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <!-- Full holographic aura -->
  <ellipse cx="60" cy="80" rx="55" ry="75" fill="FILL_COLOR" opacity="0.06"/>
  <ellipse cx="60" cy="80" rx="45" ry="60" fill="FILL_COLOR" opacity="0.05"/>
  <!-- Body - sleek -->
  <rect x="28" y="68" width="64" height="50" rx="8" fill="FILL_COLOR" opacity="0.85"/>
  <!-- Data panel on chest -->
  <rect x="38" y="74" width="44" height="32" rx="5" fill="white" opacity="0.1" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <rect x="42" y="78" width="20" height="3" rx="1" fill="#34d399" opacity="0.5"/>
  <rect x="42" y="83" width="30" height="3" rx="1" fill="#60a5fa" opacity="0.5"/>
  <rect x="42" y="88" width="15" height="3" rx="1" fill="#f472b6" opacity="0.5"/>
  <rect x="42" y="93" width="25" height="3" rx="1" fill="#fbbf24" opacity="0.5"/>
  <!-- Head -->
  <rect x="25" y="14" width="70" height="55" rx="10" fill="FILL_COLOR"/>
  <!-- Crown -->
  <polygon points="40,14 45,2 50,10 55,0 60,8 65,0 70,10 75,2 80,14" fill="#fbbf24" opacity="0.8"/>
  <circle cx="55" cy="4" r="2" fill="white" opacity="0.6"/>
  <circle cx="65" cy="4" r="2" fill="white" opacity="0.6"/>
  <!-- Eyes - glowing -->
  <rect x="34" y="32" width="18" height="10" rx="4" fill="white" opacity="0.9"/>
  <rect x="68" y="32" width="18" height="10" rx="4" fill="white" opacity="0.9"/>
  <circle cx="43" cy="37" r="3" fill="#6366f1"/>
  <circle cx="77" cy="37" r="3" fill="#6366f1"/>
  <circle cx="43" cy="37" r="1.5" fill="white"/>
  <circle cx="77" cy="37" r="1.5" fill="white"/>
  <!-- Sparkles around head -->
  <circle cx="18" cy="25" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="102" cy="30" r="2" fill="#60a5fa" opacity="0.6"/>
  <circle cx="15" cy="55" r="1.5" fill="#34d399" opacity="0.5"/>
  <circle cx="105" cy="50" r="1.5" fill="#f472b6" opacity="0.5"/>
  <!-- Wings -->
  <path d="M28 75 Q5 60 8 40 Q12 55 28 65" fill="FILL_COLOR" opacity="0.3"/>
  <path d="M92 75 Q115 60 112 40 Q108 55 92 65" fill="FILL_COLOR" opacity="0.3"/>
  <!-- Arms -->
  <rect x="8" y="72" width="18" height="10" rx="5" fill="FILL_COLOR" opacity="0.75"/>
  <rect x="94" y="72" width="18" height="10" rx="5" fill="FILL_COLOR" opacity="0.75"/>
  <!-- Data streams -->
  <line x1="8" y1="85" x2="25" y2="100" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <line x1="8" y1="90" x2="22" y2="105" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  <line x1="112" y1="85" x2="95" y2="100" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <line x1="112" y1="90" x2="98" y2="105" stroke="#f472b6" stroke-width="1" opacity="0.4"/>
  <!-- Legs -->
  <rect x="36" y="118" width="16" height="30" rx="6" fill="FILL_COLOR" opacity="0.7"/>
  <rect x="68" y="118" width="16" height="30" rx="6" fill="FILL_COLOR" opacity="0.7"/>
</svg>
