<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <!-- Holographic glow -->
  <ellipse cx="60" cy="80" rx="55" ry="70" fill="FILL_COLOR" opacity="0.08"/>
  <!-- Body -->
  <rect x="25" y="65" width="70" height="55" rx="8" fill="FILL_COLOR" opacity="0.85"/>
  <!-- Holographic panel -->
  <rect x="35" y="72" width="50" height="35" rx="6" fill="white" opacity="0.1" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="40" y1="82" x2="75" y2="82" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="40" y1="88" x2="65" y2="88" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="40" y1="94" x2="70" y2="94" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <!-- Head -->
  <rect x="22" y="12" width="76" height="55" rx="10" fill="FILL_COLOR"/>
  <!-- Eyes - narrow, focused -->
  <rect x="34" y="30" width="16" height="8" rx="3" fill="white"/>
  <rect x="70" y="30" width="16" height="8" rx="3" fill="white"/>
  <circle cx="42" cy="34" r="3" fill="#1e293b"/>
  <circle cx="78" cy="34" r="3" fill="#1e293b"/>
  <!-- Mouth - precise line -->
  <line x1="45" y1="52" x2="75" y2="52" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Holographic overlay lines -->
  <path d="M22 25 L15 20" stroke="FILL_COLOR" stroke-width="1" opacity="0.4"/>
  <path d="M98 25 L105 20" stroke="FILL_COLOR" stroke-width="1" opacity="0.4"/>
  <!-- Antenna with glow -->
  <line x1="60" y1="12" x2="60" y2="0" stroke="FILL_COLOR" stroke-width="2"/>
  <circle cx="60" cy="-1" r="5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="60" cy="-1" r="8" fill="#a78bfa" opacity="0.15"/>
  <!-- Arms -->
  <rect x="5" y="72" width="20" height="10" rx="5" fill="FILL_COLOR" opacity="0.75"/>
  <rect x="95" y="72" width="20" height="10" rx="5" fill="FILL_COLOR" opacity="0.75"/>
  <!-- Data streams from hands -->
  <line x1="5" y1="85" x2="20" y2="95" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <line x1="5" y1="90" x2="18" y2="100" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <line x1="115" y1="85" x2="100" y2="95" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <line x1="115" y1="90" x2="102" y2="100" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <!-- Legs -->
  <rect x="35" y="120" width="18" height="28" rx="7" fill="FILL_COLOR" opacity="0.7"/>
  <rect x="67" y="120" width="18" height="28" rx="7" fill="FILL_COLOR" opacity="0.7"/>
</svg>
