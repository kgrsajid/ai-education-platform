<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <!-- Body -->
  <rect x="30" y="60" width="60" height="60" rx="12" fill="FILL_COLOR" opacity="0.9"/>
  <!-- Head -->
  <rect x="25" y="15" width="70" height="50" rx="15" fill="FILL_COLOR"/>
  <!-- Eyes -->
  <circle cx="45" cy="40" r="8" fill="white"/>
  <circle cx="75" cy="40" r="8" fill="white"/>
  <circle cx="47" cy="42" r="4" fill="#1e293b"/>
  <circle cx="77" cy="42" r="4" fill="#1e293b"/>
  <!-- Mouth -->
  <path d="M50 52 Q60 58 70 52" stroke="white" stroke-width="2" fill="none"/>
  <!-- Antenna -->
  <line x1="60" y1="15" x2="60" y2="5" stroke="FILL_COLOR" stroke-width="3"/>
  <circle cx="60" cy="3" r="4" fill="#fbbf24"/>
  <!-- Arms -->
  <rect x="10" y="70" width="20" height="10" rx="5" fill="FILL_COLOR" opacity="0.8"/>
  <rect x="90" y="70" width="20" height="10" rx="5" fill="FILL_COLOR" opacity="0.8"/>
  <!-- Legs -->
  <rect x="40" y="120" width="15" height="25" rx="6" fill="FILL_COLOR" opacity="0.7"/>
  <rect x="65" y="120" width="15" height="25" rx="6" fill="FILL_COLOR" opacity="0.7"/>
  <!-- Chest light -->
  <circle cx="60" cy="90" r="8" fill="white" opacity="0.3"/>
  <circle cx="60" cy="90" r="4" fill="white" opacity="0.5"/>
</svg>
